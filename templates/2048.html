<!DOCTYPE html>
<html lang="az">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2048 Oyunu</title>

<style>

* {
    box-sizing: border-box;
}

html, body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    touch-action: none;

}


body {

    font-family: Arial, sans-serif;

    text-align: center;

    background: #faf8ef;

}


h1 {

    font-size: 42px;

    margin: 20px 0;

}


#score {

    font-size: 22px;

    margin-bottom: 20px;

}



#board {

    width: min(90vw, 400px);

    height: min(90vw, 400px);

    background: #bbada0;

    margin: auto;

    padding: 10px;

    display: grid;

    grid-template-columns: repeat(4,1fr);

    gap: 10px;

    border-radius: 10px;

}



.tile {

    background: #cdc1b4;

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: clamp(25px,8vw,40px);

    font-weight: bold;

    border-radius: 5px;

}



button {

    margin-top: 25px;

    padding: 12px 25px;

    font-size: 18px;

    border: none;

    border-radius: 8px;

    cursor: pointer;

}


</style>

</head>


<body>


<h1>🎮 2048</h1>


<div id="score">

Xal:
<span id="scoreValue">0</span>

</div>



<div id="board"></div>



<button onclick="restartGame()">

Yenidən başla

</button>



<script src="/static/js/games/2048.js"></script>


</body>

</html>
